<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理后台 · JUNNYOfficial Blog</title>
  <link rel="stylesheet" href="styles.css?v=16" />
  <style>
    /* 管理后台专用样式 */
    .admin-login {
      max-width: 400px;
      margin: 120px auto;
      padding: 40px;
      border: 1px solid #e9e9e9;
      border-radius: 24px;
      background: #ffffff;
    }
    .admin-login h2 {
      margin: 0 0 8px;
      font-size: 1.5rem;
    }
    .admin-login p {
      color: #8f8f8f;
      margin: 0 0 28px;
    }
    .admin-login input[type="password"] {
      width: 100%;
      padding: 14px 18px;
      border: 1px solid #e9e9e9;
      border-radius: 12px;
      font-size: 1rem;
      background: #fafafa;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    .admin-login input[type="password"]:focus {
      border-color: #111;
    }
    .admin-login button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #111;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .admin-login button:hover {
      background: #333;
    }
    .admin-login .error {
      color: #c00;
      font-size: 0.9rem;
      margin-top: 12px;
      display: none;
    }

    .admin-container {
      display: none;
    }
    .admin-container.is-active {
      display: block;
    }

    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0;
      border-bottom: 1px solid #e9e9e9;
      margin-bottom: 32px;
    }
    .admin-header h1 {
      margin: 0;
      font-size: 1.35rem;
    }
    .admin-header .admin-actions {
      display: flex;
      gap: 12px;
    }
    .admin-header button {
      padding: 10px 18px;
      border: 1px solid #e9e9e9;
      border-radius: 10px;
      background: #fff;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .admin-header button:hover {
      background: #f5f5f5;
    }
    .admin-header button.primary {
      background: #111;
      color: #fff;
      border-color: #111;
    }
    .admin-header button.primary:hover {
      background: #333;
    }

    .admin-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
      border-bottom: 1px solid #e9e9e9;
      padding-bottom: 12px;
    }
    .admin-tab {
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.95rem;
      color: #8f8f8f;
      transition: all 0.2s;
      border: none;
      background: none;
    }
    .admin-tab:hover {
      background: #f5f5f5;
      color: #111;
    }
    .admin-tab.is-active {
      background: #111;
      color: #fff;
    }

    .admin-panel {
      display: none;
    }
    .admin-panel.is-active {
      display: block;
    }

    .admin-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 32px;
    }
    .stat-card {
      border: 1px solid #e9e9e9;
      border-radius: 16px;
      padding: 24px;
      background: #fff;
    }
    .stat-card .stat-number {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .stat-card .stat-label {
      color: #8f8f8f;
      font-size: 0.9rem;
    }

    .admin-table {
      width: 100%;
      border-collapse: collapse;
    }
    .admin-table th,
    .admin-table td {
      text-align: left;
      padding: 14px 16px;
      border-bottom: 1px solid #e9e9e9;
      font-size: 0.95rem;
    }
    .admin-table th {
      color: #8f8f8f;
      font-weight: 500;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .admin-table tr:hover td {
      background: #fafafa;
    }
    .admin-table .tag-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      border: 1px solid #e9e9e9;
      background: #f5f5f5;
    }
    .admin-table .actions {
      display: flex;
      gap: 8px;
    }
    .admin-table .actions button {
      padding: 6px 14px;
      border: 1px solid #e9e9e9;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .admin-table .actions button:hover {
      background: #f5f5f5;
    }
    .admin-table .actions button.danger {
      color: #c00;
      border-color: #fcc;
    }
    .admin-table .actions button.danger:hover {
      background: #fee;
    }

    .admin-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .admin-modal.is-open {
      display: flex;
    }
    .admin-modal-content {
      background: #fff;
      border-radius: 20px;
      width: 100%;
      max-width: 720px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 32px;
    }
    .admin-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .admin-modal-header h3 {
      margin: 0;
    }
    .admin-modal-header .close-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: 1px solid #e9e9e9;
      background: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }
    .admin-form-group {
      margin-bottom: 20px;
    }
    .admin-form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.9rem;
      font-weight: 500;
    }
    .admin-form-group input,
    .admin-form-group select,
    .admin-form-group textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #e9e9e9;
      border-radius: 12px;
      font-size: 0.95rem;
      background: #fafafa;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .admin-form-group input:focus,
    .admin-form-group select:focus,
    .admin-form-group textarea:focus {
      border-color: #111;
    }
    .admin-form-group textarea {
      min-height: 120px;
      resize: vertical;
      line-height: 1.6;
    }
    .admin-form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .admin-modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid #e9e9e9;
    }
    .admin-modal-footer button {
      padding: 12px 24px;
      border-radius: 10px;
      border: 1px solid #e9e9e9;
      background: #fff;
      cursor: pointer;
      font-size: 0.95rem;
    }
    .admin-modal-footer button.primary {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    .body-array-item {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    .body-array-item input {
      flex: 1;
    }
    .body-array-item button {
      padding: 8px 14px;
      border: 1px solid #e9e9e9;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
    }
    .add-body-item {
      margin-top: 8px;
      padding: 10px;
      width: 100%;
      border: 1px dashed #ccc;
      border-radius: 10px;
      background: #fafafa;
      cursor: pointer;
      color: #8f8f8f;
    }
    .add-body-item:hover {
      border-color: #111;
      color: #111;
    }

    .export-area {
      background: #f5f5f5;
      border-radius: 12px;
      padding: 20px;
      margin-top: 16px;
    }
    .export-area textarea {
      width: 100%;
      min-height: 300px;
      border: 1px solid #e9e9e9;
      border-radius: 10px;
      padding: 16px;
      font-family: ui-monospace, monospace;
      font-size: 0.85rem;
      line-height: 1.5;
      resize: vertical;
      background: #fff;
    }
    .export-hint {
      color: #8f8f8f;
      font-size: 0.9rem;
      margin-bottom: 12px;
    }

    .empty-state {
      text-align: center;
      padding: 48px;
      color: #8f8f8f;
    }

    .search-box {
      width: 100%;
      max-width: 360px;
      padding: 10px 16px;
      border: 1px solid #e9e9e9;
      border-radius: 10px;
      font-size: 0.95rem;
      background: #fafafa;
      outline: none;
      margin-bottom: 20px;
    }
    .search-box:focus {
      border-color: #111;
    }

    @media (prefers-color-scheme: dark) {
      .admin-login,
      .stat-card,
      .admin-modal-content {
        background: #1a1a1a;
        border-color: #2a2a2a;
      }
      .admin-login input[type="password"],
      .admin-form-group input,
      .admin-form-group select,
      .admin-form-group textarea,
      .search-box,
      .export-area textarea {
        background: #111;
        border-color: #2a2a2a;
        color: #e5e5e5;
      }
      .admin-table tr:hover td {
        background: #1a1a1a;
      }
      .add-body-item {
        background: #1a1a1a;
        border-color: #3a3a3a;
      }
      .export-area {
        background: #1a1a1a;
      }
    }

    @media (max-width: 840px) {
      .admin-stats {
        grid-template-columns: repeat(2, 1fr);
      }
      .admin-form-row {
        grid-template-columns: 1fr;
      }
      .admin-login {
        margin: 60px 20px;
        padding: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <!-- 登录界面 -->
    <div id="loginScreen" class="admin-login">
      <h2>管理后台</h2>
      <p>请输入密码进入后台管理</p>
      <input type="password" id="loginPassword" placeholder="密码" />
      <button onclick="handleLogin()">登录</button>
      <p id="loginError" class="error">密码错误</p>
    </div>

    <!-- 管理界面 -->
    <div id="adminScreen" class="admin-container">
      <div class="admin-header">
        <h1>博客管理后台</h1>
        <div class="admin-actions">
          <button onclick="showExport()">导出代码</button>
          <button class="primary" onclick="handleLogout()">退出登录</button>
        </div>
      </div>

      <div class="admin-tabs">
        <button class="admin-tab is-active" onclick="switchTab('articles')" data-tab="articles">文章管理</button>
        <button class="admin-tab" onclick="switchTab('papers')" data-tab="papers">论文管理</button>
        <button class="admin-tab" onclick="switchTab('settings')" data-tab="settings">设置</button>
      </div>

      <!-- 文章管理面板 -->
      <div id="panel-articles" class="admin-panel is-active">
        <div class="admin-stats">
          <div class="stat-card">
            <div class="stat-number" id="statTotal">0</div>
            <div class="stat-label">总文章数</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="statLocal">0</div>
            <div class="stat-label">本地文章</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="statFeishu">0</div>
            <div class="stat-label">飞书论文</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="statDaily">0</div>
            <div class="stat-label">日常笔记</div>
          </div>
        </div>

        <input type="search" class="search-box" id="articleSearch" placeholder="搜索文章标题..." oninput="filterArticles(this.value)" />

        <button class="primary" style="margin-bottom:20px;padding:10px 18px;border-radius:10px;border:none;background:#111;color:#fff;cursor:pointer;" onclick="openEditor()">+ 新增文章</button>

        <table class="admin-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>标题</th>
              <th>标签</th>
              <th>日期</th>
              <th>来源</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="articlesTableBody"></tbody>
        </table>
      </div>

      <!-- 论文管理面板 -->
      <div id="panel-papers" class="admin-panel">
        <p style="color:#8f8f8f;margin-bottom:20px;">飞书论文通过脚本自动同步，此处仅支持查看与编辑摘要。</p>
        <input type="search" class="search-box" id="paperSearch" placeholder="搜索论文标题..." oninput="filterPapers(this.value)" />
        <table class="admin-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>标题</th>
              <th>来源</th>
              <th>日期</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="papersTableBody"></tbody>
        </table>
      </div>

      <!-- 设置面板 -->
      <div id="panel-settings" class="admin-panel">
        <div style="max-width:480px;">
          <div class="admin-form-group">
            <label>修改密码</label>
            <input type="password" id="newPassword" placeholder="新密码" />
          </div>
          <div class="admin-form-group">
            <input type="password" id="confirmPassword" placeholder="确认新密码" />
          </div>
          <button class="primary" style="padding:10px 18px;border-radius:10px;border:none;background:#111;color:#fff;cursor:pointer;" onclick="changePassword()">保存密码</button>
          <p id="passwordMsg" style="margin-top:12px;font-size:0.9rem;"></p>
        </div>
      </div>
    </div>

    <!-- 编辑弹窗 -->
    <div id="editorModal" class="admin-modal">
      <div class="admin-modal-content">
        <div class="admin-modal-header">
          <h3 id="editorTitle">编辑文章</h3>
          <button class="close-btn" onclick="closeEditor()">&times;</button>
        </div>
        <form id="editorForm" onsubmit="event.preventDefault();saveArticle();">
          <input type="hidden" id="editId" />
          <div class="admin-form-row">
            <div class="admin-form-group">
              <label>标题</label>
              <input type="text" id="editTitle" required />
            </div>
            <div class="admin-form-group">
              <label>标签</label>
              <select id="editTag">
                <option value="论文">论文</option>
                <option value="日常">日常</option>
                <option value="设计">设计</option>
              </select>
            </div>
          </div>
          <div class="admin-form-row">
            <div class="admin-form-group">
              <label>日期</label>
              <input type="text" id="editDate" placeholder="2026年4月24日" />
            </div>
            <div class="admin-form-group">
              <label>阅读时间</label>
              <input type="text" id="editReading" placeholder="5 分钟阅读" />
            </div>
          </div>
          <div class="admin-form-group">
            <label>摘要</label>
            <input type="text" id="editSummary" />
          </div>
          <div class="admin-form-group">
            <label>来源（可选，论文用）</label>
            <input type="text" id="editSource" placeholder="2026 · Nature Neuroscience" />
          </div>
          <div class="admin-form-group">
            <label>正文段落（每行一个段落）</label>
            <div id="bodyContainer"></div>
            <button type="button" class="add-body-item" onclick="addBodyField()">+ 添加段落</button>
          </div>
          <div class="admin-modal-footer">
            <button type="button" onclick="closeEditor()">取消</button>
            <button type="submit" class="primary">保存</button>
          </div>
        </form>
      </div>
    </div>

    <!-- 导出弹窗 -->
    <div id="exportModal" class="admin-modal">
      <div class="admin-modal-content">
        <div class="admin-modal-header">
          <h3>导出 script.js</h3>
          <button class="close-btn" onclick="closeExport()">&times;</button>
        </div>
        <p class="export-hint">复制下方完整代码，替换仓库中的 script.js 文件，然后提交到 GitHub 即可生效。</p>
        <div class="export-area">
          <textarea id="exportCode" readonly></textarea>
        </div>
        <div class="admin-modal-footer">
          <button onclick="closeExport()">关闭</button>
          <button class="primary" onclick="copyExport()">复制全部</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js?v=16"></script>
  <script src="admin.js?v=16"></script>
</body>
</html>
