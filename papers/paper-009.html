          <h1>分类是大脑的内在计算策略</h1>
          <div class="article-body"><p>[x] 已读</p>
<p>原标题: Categorization is 'baked' into the brain作者: Barrett &amp; Miller期刊: Nature Reviews Neuroscience发表日期: 2026年3月</p>
<p>研究背景与问题：  分类（将对象分组到等价类中）是适应性行为的基础，但传统观点认为分类是感知的最后阶段。</p>
<p>核心观点：  分类不是感知的终点，而是贯穿信号处理全过程的核心计算策略。大脑在信号处理的各个阶段都在进行类别化操作。</p></div>
