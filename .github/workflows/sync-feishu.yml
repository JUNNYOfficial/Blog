name: Sync Feishu Papers

on:
  workflow_dispatch:
    inputs:
      doc_url:
        description: '飞书文档链接'
        required: true
        type: string
  schedule:
    - cron: '0 2 * * *'  # 每天凌晨 2 点自动同步

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync from Feishu
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_DOC_URL: ${{ github.event.inputs.doc_url || secrets.FEISHU_DOC_URL }}
        run: node scripts/sync-feishu.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: 自动同步飞书论文 [$(date +%Y-%m-%d)]"
          git push
